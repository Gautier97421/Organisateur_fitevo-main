services:
  db:
    image: postgres:16-alpine
    container_name: fitevo-dev-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitevo_db}
      POSTGRES_USER: ${POSTGRES_USER:-fitevo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fitevo}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dev_pgdata:
