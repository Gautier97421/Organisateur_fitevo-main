# Docker Compose - Configuration DÉVELOPPEMENT
# Pour la production, utilisez docker-compose.prod.yml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fitevo-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: fitevo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fitevo"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitevo-web
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/fitevo
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - SESSION_SECRET=change-me-in-production-use-openssl-rand-base64-32
      - UPLOAD_DIR=/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
      - uploads_dev_data:/app/uploads

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitevo-prisma-studio
    restart: always
    ports:
      - "5557:5555"
    environment:
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/fitevo
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
    command: ["pnpm", "prisma:studio", "--browser", "none", "--port", "5555"]

volumes:
  postgres_data:
  uploads_dev_data:
